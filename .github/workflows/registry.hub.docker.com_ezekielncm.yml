name: Générer et déployer une application .NET sur une application conteneur tontapp-app-20260325003357
on:
  push:
    branches:
    - master
permissions:
  id-token: write
  contents: read
env:
  CONTAINER_APP_CONTAINER_NAME: tontapp
  CONTAINER_APP_NAME: tontapp-app-20260325003357
  CONTAINER_APP_RESOURCE_GROUP_NAME: api-app-20260325003357ResourceGroup
  CONTAINER_REGISTRY_LOGIN_SERVER: api20260325004028.azurecr.io
  DOCKER_FILE_PATH: src/Api/Dockerfile
  PROJECT_NAME_FOR_DOCKER: api
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout to the branch
      uses: actions/checkout@v4
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3
    - name: Log in to container registry
      uses: docker/login-action@v3
      with:
        registry: ${{ env.CONTAINER_REGISTRY_LOGIN_SERVER }}
        username: ${{ secrets.Api20260325004028_USERNAME_2084 }}
        password: ${{ secrets.Api20260325004028_PASSWORD_2084 }}
    - name: Build and push container image to registry
      uses: docker/build-push-action@v6
      with:
        push: true
        tags: ${{ env.CONTAINER_REGISTRY_LOGIN_SERVER }}/${{ env.PROJECT_NAME_FOR_DOCKER }}:${{ github.sha }}
        file: ${{ env.DOCKER_FILE_PATH }}
  deploy:
    runs-on: ubuntu-latest
    needs: build
    steps:
    - name: Azure Login
      uses: azure/login@v2
      with:
        client-id: ${{ vars.tontapp_app_20260325003357_CLIENT_ID_4A67 }}
        tenant-id: ${{ vars.tontapp_app_20260325003357_TENANT_ID_2084 }}
        subscription-id: ${{ vars.tontapp_app_20260325003357_SUBSCRIPTION_ID_2084 }}
    - name: Deploy to containerapp
      uses: azure/CLI@v2
      with:
        inlineScript: >
          az config set extension.use_dynamic_install=yes_without_prompt

          az containerapp registry set --name ${{ env.CONTAINER_APP_NAME }} --resource-group ${{ env.CONTAINER_APP_RESOURCE_GROUP_NAME }} --server ${{ env.CONTAINER_REGISTRY_LOGIN_SERVER }} --username ${{ secrets.Api20260325004028_USERNAME_2084 }} --password ${{ secrets.Api20260325004028_PASSWORD_2084 }}

          az containerapp update --name ${{ env.CONTAINER_APP_NAME }} --container-name ${{ env.CONTAINER_APP_CONTAINER_NAME }} --resource-group ${{ env.CONTAINER_APP_RESOURCE_GROUP_NAME }} --image ${{ env.CONTAINER_REGISTRY_LOGIN_SERVER }}/${{ env.PROJECT_NAME_FOR_DOCKER }}:${{ github.sha }}
    - name: logout
      run: >
        az logout
